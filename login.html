<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Log in - Synapse Support</title>
<link rel="stylesheet" href="fonts/opensans.css"/>
<link rel="stylesheet" href="css/bulmaswatch.min.css"/>
<link rel="stylesheet" href="css/bulma-tooltip.min.css"/>
<link rel="stylesheet" href="css/bulma-badge.min.css"/>
<link rel="stylesheet" href="css/overrides.css"/>
<link rel="stylesheet" href="lib/fontawesome/css/all.min.css"/>
<script src="lib/jquery/dist/jquery.min.js"></script>
<script src="lib/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/site.js"></script>
<script type="module" src="js/auth.js"></script>
</head>
<body>
<header>
<nav class="navbar is-dark" role="navigation" aria-label="main navigation">
<div class="navbar-brand is-dark">
<a class="navbar-item" href="index.html">
<img src="img/syn_full.png" width="112" height="28" alt="Synapse Logo">
</a>
<a role="button" class="navbar-burger" aria-label="menu" aria-expanded="false" data-target="navbar">
<span aria-hidden="true"></span>
<span aria-hidden="true"></span>
<span aria-hidden="true"></span>
</a>
</div>
<div id="navbar" class="navbar-menu is-dark">
<div class="navbar-start">
<a class="navbar-item" href="Knowledgebase.html">
Knowledgebase
</a>
<hr class="navbar-hr m-0"/>
</div>
<div class="navbar-end">
<div id="authButtons" class="navbar-item no-hover">
<div class="buttons">
<a class="button is-primary" href="register.html">
<strong>Sign up</strong>
</a>
<a class="button is-light" href="login.html">
Log in
</a>
</div>
</div>
<div id="userMenu" class="navbar-item no-hover is-hidden">
<div class="buttons">
<span class="button is-static"><span id="userLabel"></span></span>
<a id="logoutButton" class="button is-light" href="#">Log out</a>
</div>
</div>
</div>
</div>
</nav>
</header>
<section class="section">
<div class="container">
<div class="columns is-centered">
<div class="column is-5-tablet is-4-desktop">
<div class="card">
<div class="card-content">
<h3 class="title is-4 has-text-centered">Log in</h3>
<p class="subtitle is-6 has-text-centered has-text-grey">Welcome back to Synapse Support.</p>

<div id="authError" class="notification is-danger is-light is-hidden"></div>

<form id="loginForm" novalidate>
<div class="field">
<label class="label" for="email">Email</label>
<div class="control has-icons-left">
<input class="input" type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email" required/>
<span class="icon is-small is-left"><i class="fas fa-envelope"></i></span>
</div>
</div>
<div class="field">
<label class="label" for="password">Password</label>
<div class="control has-icons-left">
<input class="input" type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required/>
<span class="icon is-small is-left"><i class="fas fa-lock"></i></span>
</div>
</div>
<div class="field mt-5">
<button type="submit" class="button is-primary is-fullwidth"><strong>Log in</strong></button>
</div>
</form>

<div class="has-text-centered my-3 has-text-grey">or</div>
<button class="button is-light is-fullwidth" data-google-signin>
<span class="icon"><i class="fab fa-google"></i></span>
<span>Continue with Google</span>
</button>

<p class="has-text-centered mt-5">
Don't have an account? <a href="register.html">Sign up</a>
</p>
</div>
</div>
</div>
</div>
</div>
</section>
</body>
</html>
