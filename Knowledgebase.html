<script>
function getLoginBg() {
  const dateTime = new Date();
  const dateHours = dateTime.getHours();

  if (dateHours >= 5 && dateHours < 12) {
    return 2;
  } else if (dateHours >= 12 && dateHours < 17) {
    return 4;
  } else if (dateHours >= 17 && dateHours < 21) {
    return 3;
  } else {
    return 1;
  }
}

$search = $("#knowledgebaseSearch");
$search.css("background", `url('img/${getLoginBg()}.jpg') no-repeat center top`);
$search.css("background-size", "cover");
</script>

<script>
        (function () {
            var button = document.querySelector("#consentCookies button[data-cookie-string]");
            button.addEventListener("click", function (event) {
                document.cookie = button.dataset.cookieString;
                document.getElementById("consentCookies").remove();
            }, false);
        })();
    </script>
